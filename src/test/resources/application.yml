spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8
  thymeleaf:
    cache: false
  security:
    user:
      name: test
      password: test
logging:
  level:
    root: WARN
    com.epam.rd.autocode.assessment.appliances: WARN
