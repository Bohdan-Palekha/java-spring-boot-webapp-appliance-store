<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{password.forgot.title}">Forgot Password</title></head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <h2 class="mb-4" th:text="#{password.forgot.title}">Forgot Password</h2>
            <p class="text-muted mb-4" th:text="#{password.forgot.hint}">
                Enter your email and we'll send you a reset link.
            </p>

            <form method="post" th:action="@{/forgot-password}">
                <div class="mb-3">
                    <label class="form-label" th:text="#{auth.login.email.label}">Email</label>
                    <input autocomplete="email" autofocus class="form-control"
                           name="email" required type="email">
                </div>
                <button class="btn btn-primary w-100" th:text="#{password.forgot.submit}"
                        type="submit">Send Reset Link
                </button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/login}" th:text="#{action.back}">Back to Login</a>
            </div>

        </div>
    </div>
</main>
</html>
