<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{password.reset.title}">Reset Password</title></head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <h2 class="mb-4" th:text="#{password.reset.title}">Reset Password</h2>

            <form method="post" novalidate th:action="@{/reset-password}">
                <input name="token" th:value="${token}" type="hidden">

                <div class="mb-3">
                    <label class="form-label" th:text="#{auth.register.password.label}">New Password</label>
                    <input autocomplete="new-password" class="form-control" maxlength="72"
                           minlength="8" name="password" pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&amp;+=!]).{8,72}$"
                           required
                           type="password">
                    <div class="form-text small text-muted" th:text="#{auth.password.hint}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{auth.register.confirm.label}">Confirm Password</label>
                    <input autocomplete="new-password" class="form-control" maxlength="72"
                           minlength="8" name="confirmPassword" required
                           type="password">
                </div>

                <button class="btn btn-primary w-100" th:text="#{password.reset.submit}"
                        type="submit">Set New Password
                </button>
            </form>

        </div>
    </div>
</main>
</html>
