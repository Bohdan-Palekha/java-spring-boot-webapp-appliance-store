<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{auth.login.title}">Log In</title></head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <h2 class="mb-4" th:text="#{auth.login.title}">Log In</h2>

            <div class="alert alert-danger" th:if="${param.error}" th:text="#{auth.login.error}">Invalid credentials.
            </div>
            <div class="alert alert-info" th:if="${param.logout}" th:text="#{auth.logout.success}">Logged out.</div>
            <div class="alert alert-success" th:if="${param.registered}" th:text="#{registration.success}">Account
                created.
            </div>
            <div class="alert alert-warning" th:if="${param.tokenExpired}" th:text="#{password.reset.invalid}">Link
                expired.
            </div>

            <form method="post" novalidate th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label" th:text="#{auth.login.email.label}">Email</label>
                    <input autocomplete="email" autofocus class="form-control"
                           name="email" required type="email">
                </div>
                <div class="mb-1">
                    <label class="form-label" th:text="#{auth.login.password.label}">Password</label>
                    <input autocomplete="current-password" class="form-control" name="password"
                           required type="password">
                </div>

                <div class="text-end mb-3">
                    <a class="small text-muted" th:href="@{/forgot-password}"
                       th:text="#{password.forgot.link}">Forgot password?</a>
                </div>

                <button class="btn btn-primary w-100 mb-3" th:text="#{auth.login.submit}"
                        type="submit">Log In
                </button>
            </form>

            <div class="d-flex align-items-center mb-3">
                <hr class="flex-grow-1">
                <span class="mx-2 text-muted small">or</span>
                <hr class="flex-grow-1">
            </div>

            <a class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center gap-2"
               href="/oauth2/authorization/google">
                <svg height="16" viewBox="0 0 48 48" width="16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.5 13 17.8 9.5 24 9.5z"
                          fill="#EA4335"/>
                    <path d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"
                          fill="#4285F4"/>
                    <path d="M10.6 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.9-6.1z"
                          fill="#34A853"/>
                    <path d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.7 2.2-7.7 2.2-6.2 0-11.4-4.2-13.3-9.9l-7.9 6.1C6.7 42.6 14.7 48 24 48z"
                          fill="#FBBC05"/>
                </svg>
                Continue with Google
            </a>

            <p class="text-center small text-muted">
                <span th:text="#{auth.login.no.account}">No account?</span>
                <a th:href="@{/register}" th:text="#{auth.login.register.link}">Register here</a>
            </p>

        </div>
    </div>
</main>
</html>
