<!DOCTYPE html>
<html th:fragment="layout(title, content)"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:replace="${title}">Appliance Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .badge-pending {
            background-color: #ffc107;
            color: #000;
        }

        .badge-approved {
            background-color: #198754;
            color: #fff;
        }

        .badge-rejected {
            background-color: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-lightning-charge-fill text-warning me-1"></i>
            <span th:text="#{nav.brand}">Appliance Store</span>
        </a>
        <button class="navbar-toggler" data-bs-target="#nav" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:text="#{nav.home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/appliances}" th:text="#{nav.appliances}">Appliances</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/orders}" th:text="#{nav.orders}">My Orders</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/profile}" th:text="#{nav.profile}">My Profile</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#"
                       th:text="#{nav.admin}">Admin</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/admin/appliances}">
                            <i class="bi bi-box-seam me-1"></i>
                            <span th:text="#{nav.appliances}">Appliances</span></a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/orders}">
                            <i class="bi bi-cart-check me-1"></i>
                            <span th:text="#{admin.nav.orders}">Orders</span></a></li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" th:href="@{/admin/manufacturers}">
                                <i class="bi bi-building me-1"></i>
                                <span th:text="#{nav.manufacturers}">Manufacturers</span></a></li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" th:href="@{/admin/users}">
                                <i class="bi bi-people me-1"></i>
                                <span th:text="#{nav.users}">Users</span></a></li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <div class="btn-group btn-group-sm">
                    <a class="btn btn-outline-light" th:classappend="${#locale.language=='en'} ? ' active' : ''"
                       th:href="@{''(lang=en)}">EN</a>
                    <a class="btn btn-outline-light" th:classappend="${#locale.language=='uk'} ? ' active' : ''"
                       th:href="@{''(lang=uk)}">UK</a>
                </div>
                <div class="d-flex gap-1" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/login}" th:text="#{nav.login}">Log In</a>
                    <a class="btn btn-warning btn-sm" th:href="@{/register}" th:text="#{nav.register}">Register</a>
                </div>
                <div class="d-flex align-items-center gap-2" sec:authorize="isAuthenticated()">
                    <span class="text-light small">
                        <i class="bi bi-person-circle me-1"></i><span sec:authentication="name"></span>
                    </span>
                    <form class="d-inline" method="post" th:action="@{/logout}">
                        <button class="btn btn-outline-light btn-sm" th:text="#{nav.logout}" type="submit">Log Out
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-2">
    <div class="alert alert-success alert-dismissible fade show" th:if="${successMessage}">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="#{${successMessage}}">OK</span>
        <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${errorMessage}">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}">Error</span>
        <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
    </div>
</div>

<main class="container my-4 flex-grow-1">
    <th:block th:replace="${content}"/>
</main>

<footer class="bg-dark text-light py-3 mt-auto">
    <div class="container text-center">
        <small th:text="#{footer.copyright}">© 2026 Appliance Store</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
