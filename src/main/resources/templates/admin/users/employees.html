<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{admin.users.employees.title}">Employees</title></head>
<body>
<main>
    <div class="d-flex justify-content-between mb-3">
        <h2 th:text="#{admin.users.employees.title}">Employees</h2>
        <a class="btn btn-success" th:href="@{/admin/users/employees/new}" th:text="#{admin.users.employee.add}">+ Add
            Employee</a>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th th:text="#{table.id}">ID</th>
                <th th:text="#{table.name}">Name</th>
                <th th:text="#{table.email}">Email</th>
                <th th:text="#{table.department}">Department</th>
                <th th:text="#{table.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${employees}">
                <td th:text="${e.id}">1</td>
                <td th:text="${e.name}">Name</td>
                <td th:text="${e.email}">email</td>
                <td>
                    <span class="badge bg-danger" th:if="${'ADMIN'.equalsIgnoreCase(e.department)}">ADMIN</span>
                    <span th:text="${e.department}" th:unless="${'ADMIN'.equalsIgnoreCase(e.department)}">Dept</span>
                </td>
                <td>
                    <div class="d-flex gap-1 flex-wrap">
                        <form class="d-flex gap-1" method="post"
                              th:action="@{/admin/users/{id}/department(id=${e.id})}">
                            <input class="form-control form-control-sm" maxlength="100" name="department"
                                   style="width:110px" th:value="${e.department}" type="text">
                            <button class="btn btn-sm btn-outline-primary" th:text="#{admin.users.employee.set.dept}"
                                    type="submit">Set
                            </button>
                        </form>
                        <form method="post" th:action="@{/admin/users/employees/{id}/delete(id=${e.id})}"
                              th:onsubmit="'return confirm(\'' + #{action.confirm.delete} + '\')'">
                            <button class="btn btn-sm btn-outline-danger" th:text="#{action.delete}"
                                    type="submit">Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</html>
