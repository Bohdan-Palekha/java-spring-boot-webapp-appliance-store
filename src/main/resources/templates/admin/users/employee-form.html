<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head><title>Create Employee</title></head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4">Create Employee</h2>
            <form method="post" novalidate th:action="@{/admin/users/employees}" th:object="${form}">
                <div class="mb-3"><label class="form-label">Name</label>
                    <input class="form-control" maxlength="100" minlength="2"
                           required th:classappend="${#fields.hasErrors('name')}?' is-invalid':''" th:field="*{name}" type="text">
                    <div class="invalid-feedback" th:errors="*{name}">Error</div>
                </div>
                <div class="mb-3"><label class="form-label">Email</label>
                    <input class="form-control" maxlength="100"
                           required th:classappend="${#fields.hasErrors('email')}?' is-invalid':''" th:field="*{email}"
                           type="email">
                    <div class="invalid-feedback" th:errors="*{email}">Error</div>
                </div>
                <div class="mb-3"><label class="form-label">Department</label>
                    <input class="form-control" maxlength="100" name="department" th:value="${department}" type="text">
                </div>
                <div class="mb-3"><label class="form-label">Password</label>
                    <input class="form-control" maxlength="72"
                           minlength="8" pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&amp;+=!]).{8,72}$"
                           required th:classappend="${#fields.hasErrors('password')}?' is-invalid':''" th:field="*{password}"
                           type="password">
                    <div class="invalid-feedback" th:errors="*{password}">Error</div>
                </div>
                <div class="mb-3"><label class="form-label">Confirm Password</label>
                    <input class="form-control" maxlength="72"
                           minlength="8"
                           required th:classappend="${#fields.hasErrors('confirmPassword')}?' is-invalid':''" th:field="*{confirmPassword}" type="password">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}">Error</div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Create</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/users/employees}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</html>
