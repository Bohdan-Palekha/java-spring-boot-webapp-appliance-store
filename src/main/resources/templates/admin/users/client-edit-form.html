<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{admin.users.client.edit.title}">Edit Client</title></head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4" th:text="#{admin.users.client.edit.title}">Edit Client</h2>
            <form method="post" novalidate th:action="@{/admin/users/clients/{id}(id=${clientId})}" th:object="${form}">
                <div class="mb-3">
                    <label class="form-label" th:text="#{table.name}">Name</label>
                    <input class="form-control" maxlength="100"
                           minlength="2"
                           required th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''" th:field="*{name}" type="text">
                    <div class="invalid-feedback" th:errors="*{name}">Error</div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{table.email}">Email</label>
                    <input class="form-control" maxlength="255"
                           required
                           th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''" th:field="*{email}" type="email">
                    <div class="invalid-feedback" th:errors="*{email}">Error</div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" th:text="#{action.save}" type="submit">Save</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/users/clients}" th:text="#{action.cancel}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
</html>
