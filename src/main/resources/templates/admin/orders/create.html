<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{action.place.order}">Place Order</title></head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4" th:text="#{action.place.order}">Place Order</h2>

            <div class="card mb-4" th:if="${selectedAppliance}">
                <div class="card-body">
                    <h5 th:text="${selectedAppliance.name}">Appliance</h5>
                    <p class="text-muted mb-1" th:text="${selectedAppliance.manufacturer.name}">Brand</p>
                    <p class="fw-bold text-success mb-0"
                       th:text="${@priceHelper.format(selectedAppliance.price, #locale)}">$0.00</p>
                </div>
            </div>

            <form method="post" novalidate th:action="@{/orders/place}" th:object="${orderForm}">

                <div class="mb-3" th:unless="${selectedAppliance}">
                    <label class="form-label">
                        <span th:text="#{order.form.applianceId}">Appliance ID</span>
                        <span class="text-danger">*</span>
                    </label>
                    <input class="form-control" min="1"
                           required
                           th:classappend="${#fields.hasErrors('applianceId')} ? ' is-invalid' : ''" th:field="*{applianceId}" type="number">
                    <div class="invalid-feedback" th:errors="*{applianceId}">Error</div>
                </div>
                <input th:field="*{applianceId}" th:if="${selectedAppliance}" type="hidden">

                <div class="mb-3">
                    <label class="form-label">
                        <span th:text="#{order.form.quantity}">Quantity</span>
                        <span class="text-danger">*</span>
                    </label>
                    <input class="form-control" max="100"
                           min="1"
                           required th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid' : ''" th:field="*{quantity}" type="number">
                    <div class="invalid-feedback" th:errors="*{quantity}">Error</div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success" th:text="#{action.place.order}" type="submit">Place Order</button>
                    <a class="btn btn-outline-secondary" th:href="@{/appliances}" th:text="#{action.back}">Back</a>
                </div>
            </form>
        </div>
    </div>
</main>
</html>
