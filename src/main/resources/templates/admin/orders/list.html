<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title th:text="#{admin.manage.orders}">Manage Orders</title></head>
<body>
<main>
    <h2 class="mb-3" th:text="#{admin.manage.orders}">Manage Orders</h2>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${approved == null and param.approved == null} ? ' active' : ''"
               th:href="@{/admin/orders}" th:text="#{admin.orders.tab.all}">All</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${param.approved != null and param.approved[0] == ''} ? ' active' : ''"
               th:href="@{/admin/orders(approved='')}">
                <span th:text="#{order.status.pending}">Pending</span>
                <span class="badge bg-warning text-dark" th:text="${pendingCount}">0</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${approved == true} ? ' active' : ''"
               th:href="@{/admin/orders(approved=true)}">
                <span th:text="#{order.status.approved}">Approved</span>
                <span class="badge bg-success" th:text="${approvedCount}">0</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${approved == false} ? ' active' : ''"
               th:href="@{/admin/orders(approved=false)}">
                <span th:text="#{order.status.rejected}">Rejected</span>
                <span class="badge bg-danger" th:text="${rejectedCount}">0</span>
            </a>
        </li>
    </ul>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th th:text="#{table.id}">#</th>
                <th th:text="#{table.client}">Client</th>
                <th th:text="#{table.employee}">Employee</th>
                <th th:text="#{table.status}">Status</th>
                <th th:text="#{table.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(orders)}">
                <td class="text-center text-muted py-3" colspan="5" th:text="#{orders.no.orders}">No orders.</td>
            </tr>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}">1</td>
                <td>
                    <div th:text="${o.client.name}">Client</div>
                    <small class="text-muted" th:text="${o.client.email}">email</small>
                </td>
                <td th:text="${o.employee?.name} ?: '—'">Emp</td>
                <td>
                    <span th:class="${'badge ' + (o.pending ? 'badge-pending' : (o.approved ? 'badge-approved' : 'badge-rejected'))}"
                          th:text="#{${o.pending ? 'order.status.pending' : (o.approved ? 'order.status.approved' : 'order.status.rejected')}}">Status</span>
                </td>
                <td>
                    <div class="d-flex gap-1">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/orders/{id}(id=${o.id})}"
                           th:text="#{action.view}">View</a>
                        <div class="d-flex gap-1" th:if="${o.pending}">
                            <form method="post" th:action="@{/admin/orders/{id}/approve(id=${o.id})}">
                                <button class="btn btn-sm btn-success" th:text="#{action.approve}" type="submit">
                                    Approve
                                </button>
                            </form>
                            <form method="post" th:action="@{/admin/orders/{id}/reject(id=${o.id})}">
                                <button class="btn btn-sm btn-danger" th:text="#{action.reject}" type="submit">Reject
                                </button>
                            </form>
                        </div>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="d-flex justify-content-center" th:if="${totalPages > 1}">
        <ul class="pagination pagination-sm">
            <li class="page-item" th:classappend="${i == currentPage} ? ' active' : ''"
                th:each="i : ${#numbers.sequence(0, totalPages-1)}">
                <a class="page-link" th:href="@{/admin/orders(page=${i},approved=${approved})}"
                   th:text="${i + 1}">1</a>
            </li>
        </ul>
    </nav>
</main>
</html>
