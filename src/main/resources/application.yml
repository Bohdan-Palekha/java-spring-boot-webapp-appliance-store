spring:
  application:
    name: appliance-store
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    encoding: UTF-8
    mode: HTML
    cache: true
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT-ID}
            client-secret: ${CLIENT-SECRET}
            scope: openid,profile,email

server:
  port: 8080
  error:
    include-stacktrace: never
    include-exception: false
    include-message: never
    whitelabel:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-replace-in-production!!}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

logging:
  level:
    root: WARN
    com.epam.rd.autocode.assessment.appliances: INFO
    org.springframework.security: INFO
